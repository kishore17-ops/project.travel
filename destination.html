<!DOCTYPE html>
<html>
<head>
<title>Destination</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="destBody">

<div class="destCard">

<h1 id="title"></h1>

<div class="packageOptions">
  <button class="payBtn" id="basicBtn" onclick="selectPackage('Basic', 15000)">Basic ₹15,000</button>
  <button class="payBtn" id="premiumBtn" onclick="selectPackage('Premium', 30000)">Premium ₹30,000</button>
  <button class="payBtn" id="luxuryBtn" onclick="selectPackage('Luxury', 60000)">Luxury ₹60,000</button>
</div>

</div>

<script>

let place = localStorage.getItem("destination") || "your destination";

function selectPackage(type, amount) {
  localStorage.setItem('packageType', type);
  localStorage.setItem('packageAmount', amount);
  window.location.href = 'payment.html';
}

document.getElementById("title").innerHTML = "Trip to " + place;

</script>

</body>
</html>
