<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="adminBody">

<div class="adminCard">

<h1>Admin Dashboard</h1>

<div id="data"></div>

<button class="logoutBtn" onclick="logout()">Logout</button>

</div>

<script>

if(localStorage.getItem("adminLogin")!="true"){
  window.location.href="admin-login.html"
}

const bookings = JSON.parse(localStorage.getItem("bookings")) || [];

function renderBookingsTable() {
  if (!bookings.length) {
    document.getElementById("data").innerHTML = "<p style=\"color:rgba(255,255,255,0.8);\">No bookings yet.</p>";
    return;
  }

  let table = `
    <div class="bookingTableWrapper">
      <table class="bookingTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Destination</th>
            <th>Package</th>
          </tr>
        </thead>
        <tbody>
  `;

  bookings.forEach((b, index) => {
    const packageType = b.packageType || b.pkg || "-";
    const packageAmount = b.packageAmount ? `₹${b.packageAmount}` : "-";

    table += `
      <tr>
        <td>${index + 1}</td>
        <td>${b.name || "-"}</td>
        <td>${b.phone || "-"}</td>
        <td>${b.email || "-"}</td>
        <td>${b.place || "-"}</td>
        <td>${packageType} ${packageAmount}</td>
      </tr>
    `;
  });

  table += `
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("data").innerHTML = table;
}

renderBookingsTable();

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href="admin-login.html";
}

</script>

</body>
</html>
